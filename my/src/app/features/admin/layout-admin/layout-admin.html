<div class="flex h-screen w-full bg-gray-200 overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-[230px] bg-navy flex flex-col flex-shrink-0 overflow-y-auto scrollbar-thin">

    <!-- Logo -->
    <div class="px-4 py-5 border-b border-white/[0.08] flex items-center gap-2.5">
      <div class="w-10 h-10 bg-white rounded-[9px] flex items-center justify-center flex-shrink-0">
        <img src="/icon.jpeg" class="w-8 h-8">
      </div>
      <div>
        <div class="text-white text-[17px] font-semibold tracking-tight">People</div>
        <div class="text-white/40 text-[10px] tracking-widest uppercase mt-px">Mas cerca de ti</div>
      </div>
    </div>

    <!-- Administración -->
    <div class="px-3.5 pt-4 pb-1.5 text-white/30 text-[10px] tracking-[0.12em] uppercase font-semibold">
      Administración
    </div>
    <a routerLink="/admin/empleados" routerLinkActive="bg-teal !text-white"
       class="flex items-center gap-2.5 px-2.5 py-2 mx-2 rounded-[7px] text-white/52 text-[13px] hover:bg-white/[0.07] hover:text-white/90 transition-all">
      <span class="material-symbols-outlined text-[17px] flex-shrink-0">badge</span>
      Trabajadores
    </a>
    <a routerLink="/admin/usuarios" routerLinkActive="bg-teal !text-white"
       class="flex items-center gap-2.5 px-2.5 py-2 mx-2 rounded-[7px] text-white/52 text-[13px] hover:bg-white/[0.07] hover:text-white/90 transition-all">
      <span class="material-symbols-outlined text-[17px] flex-shrink-0">group</span>
      Usuarios
    </a>

    <!-- Bottom -->
    <div class="mt-auto border-t border-white/[0.08] p-2">
      <button (click)="logout()"
              style="color: white;"
              class="flex items-center cursor-pointer gap-3 p-3 py-2.5 hover:text-teal w-full group relative rounded-lg hover:bg-teal/10 transition-colors">
        <span style="color: white;" class="material-symbols-outlined text-[17px] flex-shrink-0">logout</span>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="flex-1 flex flex-col overflow-hidden transition-all duration-300">
    <header class="h-14 bg-white border-b border-border flex items-center px-6 gap-3 flex-shrink-0">
      <span class="material-symbols-outlined text-teal text-xl">dashboard</span>
      <span class="text-[15px] font-semibold text-navy">Dashboard</span>
      <div class="ml-auto flex items-center gap-3.5">
        <div class="text-right">
          <div class="text-[13px] font-medium text-navy">{{ nombre() }}</div>
          <div class="text-[11px] text-muted">{{ rol() }}</div>
        </div>
        <div
          class="w-[33px] h-[33px] rounded-full bg-teal text-white flex items-center justify-center text-[13px] font-semibold">
          {{ inicial() }}
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
