name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./em-Backend
          - service: frontend
            context: ./my-Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sistemaempleados:${{ matrix.service }}latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sistemaempleados:${{ matrix.service }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
