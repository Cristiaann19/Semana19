name: Build, Push & Deploy

on:
    push:
        branches: [main]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - service: backend
                      context: ./em-Backend
                    - service: frontend
                      context: ./my-Frontend
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - uses: docker/build-push-action@v6
              with:
                  context: ${{ matrix.context }}
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/sistemaempleados:${{ matrix.service }}-latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/sistemaempleados:${{ matrix.service }}-${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Deploy to Linux VPS
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  port: 22
                  username: ${{ secrets.VPS_USERNAME }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  command_timeout: 30m
                  script: |
                      cd /proyectosdev/Semana19
                      git fetch origin
                      git reset --hard origin/main
                      git clean -fd
                      docker compose down
                      docker compose pull
                      docker compose up -d
