<div class="min-h-screen bg-[#083d3a] flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
    <div class="p-8">

      <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-3 mb-4 pb-4 border-b border-gray-100">
          <h1 class="text-2xl text-gray-800">
            <span class="font-extrabold text-[#083d3a]">Sistema</span>Personas
          </h1>
          <div>
            <img src="Minecraft-creeper-face.jpg" alt="acuamont" class="w-10 h-10 object-contain">
          </div>
        </div>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div>
          <label for="usuario" class="block text-sm font-semibold text-gray-700 mb-1.5">Usuario</label>
          <input type="text" id="usuario" formControlName="usuario"
                 class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all placeholder:text-gray-400"
                 placeholder="Nombre de usuario">
        </div>

        <div class="mt-5">
          <label for="clave" class="block text-sm font-semibold text-gray-700 mb-1.5">Contraseña</label>
          <input type="password" id="clave" formControlName="clave"
                 class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all placeholder:text-gray-400"
                 placeholder="••••••••">
        </div>

        @if (errorMessage) {
          <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
            {{ errorMessage }}
          </div>
        }

        <div class="pt-2">
          <button type="submit"
                  [disabled]="loginForm.invalid || loading"
                  class="w-full bg-emerald-700 hover:bg-[#083d3a] disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold py-3 rounded-xl transition-all duration-200 shadow-lg shadow-blue-900/20 active:scale-[0.97] cursor-pointer">
            {{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}
          </button>
        </div>
      </form>
    </div>

    <div class="bg-gray-50 py-4 text-center border-t border-gray-100">
      <small class="text-gray-400">© 2026 People - Gestión de trabajadores</small>
    </div>
  </div>
</div>
